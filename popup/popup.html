<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 翻译助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 标题 -->
    <div class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#4f7cff"/>
          <path d="M8 10h12M8 14h8M8 18h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="20" cy="18" r="4" fill="#fff"/>
          <text x="20" y="21" text-anchor="middle" font-size="6" fill="#4f7cff" font-weight="bold">AI</text>
        </svg>
        <span>AI 翻译助手</span>
      </div>
    </div>

    <!-- 功能按钮区 -->
    <div class="actions" id="actionsSection">
      <button class="action-btn" id="translatePageBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 5h12M9 3v2M5 9h6M5 13h8M5 17h10"/>
          <path d="M14 14l4 4 4-4M18 8v10"/>
        </svg>
        <span>全页面翻译</span>
      </button>
      <button class="action-btn" id="restoreBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9M3 4v5h5"/>
        </svg>
        <span>恢复原文</span>
      </button>
      <button class="action-btn" id="summarizeBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h10"/>
        </svg>
        <span>网页总结</span>
      </button>
    </div>

    <!-- 划词翻译提示 -->
    <div class="tip">
      <span>💡 划词翻译：选中网页文字后自动翻译</span>
    </div>

    <!-- 分割线 -->
    <div class="divider"></div>

    <!-- 设置区 -->
    <div class="settings">
      <div class="setting-title">⚙️ API 设置</div>

      <div class="setting-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      </div>

      <div class="setting-group">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.deepseek.com" autocomplete="off">
      </div>

      <div class="setting-group">
        <label for="model">模型名称</label>
        <input type="text" id="model" placeholder="deepseek-v4-flash" autocomplete="off">
      </div>

      <div class="setting-actions">
        <button class="btn-secondary" id="testBtn">测试连接</button>
        <button class="btn-primary" id="saveBtn">保存设置</button>
      </div>
    </div>

    <!-- 状态提示 -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
